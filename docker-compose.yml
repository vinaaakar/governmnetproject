version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ucrs_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ucrs_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ucrs_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/ucrs
      - JWT_SECRET=ucrs_super_secret_key_2026
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
      - ai-service
    networks:
      - ucrs_network
    volumes:
      - ./backend:/app
      - /app/node_modules

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ucrs_ai_service
    ports:
      - "8000:8000"
    networks:
      - ucrs_network
    volumes:
      - ./ai-service:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ucrs_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - ucrs_network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  ucrs_network:
    driver: bridge
